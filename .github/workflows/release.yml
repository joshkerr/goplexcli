name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.24'

    - name: Build binaries
      run: |
        mkdir -p build

        # Stamp the binary with the tag version (strip the leading "v") so
        # `goplexcli version` and the self-updater report the real version.
        VERSION="${GITHUB_REF_NAME#v}"
        LDFLAGS="-s -w -X main.version=${VERSION}"

        # macOS AMD64
        GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/goplexcli-darwin-amd64 ./cmd/goplexcli

        # macOS ARM64
        GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/goplexcli-darwin-arm64 ./cmd/goplexcli

        # Linux AMD64
        GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/goplexcli-linux-amd64 ./cmd/goplexcli

        # Linux ARM64
        GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/goplexcli-linux-arm64 ./cmd/goplexcli

        # Windows AMD64
        GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o build/goplexcli-windows-amd64.exe ./cmd/goplexcli

        # Windows ARM64
        GOOS=windows GOARCH=arm64 go build -ldflags "$LDFLAGS" -o build/goplexcli-windows-arm64.exe ./cmd/goplexcli

        # Create archives (for manual download)
        cd build
        tar czf goplexcli-darwin-amd64.tar.gz goplexcli-darwin-amd64
        tar czf goplexcli-darwin-arm64.tar.gz goplexcli-darwin-arm64
        tar czf goplexcli-linux-amd64.tar.gz goplexcli-linux-amd64
        tar czf goplexcli-linux-arm64.tar.gz goplexcli-linux-arm64
        zip goplexcli-windows-amd64.zip goplexcli-windows-amd64.exe
        zip goplexcli-windows-arm64.zip goplexcli-windows-arm64.exe

    - name: Generate release notes
      id: release_notes
      run: |
        # Find the previous tag; fall back to the full history if there isn't one.
        PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
        if [ -n "$PREV_TAG" ]; then
          RANGE="${PREV_TAG}..HEAD"
        else
          RANGE="HEAD"
        fi
        # `tformat` terminates every line (incl. the last) with a newline, so the
        # closing heredoc delimiter below always lands on its own line.
        {
          echo "RELEASE_NOTES<<EOF"
          git log --pretty=tformat:"- %s" "$RANGE"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/goplexcli-darwin-amd64
          build/goplexcli-darwin-arm64
          build/goplexcli-linux-amd64
          build/goplexcli-linux-arm64
          build/goplexcli-windows-amd64.exe
          build/goplexcli-windows-arm64.exe
          build/*.tar.gz
          build/*.zip
        body: |
          ## Changes
          
          ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          
          ## Installation
          
          Download the appropriate binary for your platform and extract it:
          
          **macOS (Intel)**
          ```bash
          tar xzf goplexcli-darwin-amd64.tar.gz
          sudo mv goplexcli-darwin-amd64 /usr/local/bin/goplexcli
          ```
          
          **macOS (Apple Silicon)**
          ```bash
          tar xzf goplexcli-darwin-arm64.tar.gz
          sudo mv goplexcli-darwin-arm64 /usr/local/bin/goplexcli
          ```
          
          **Linux (AMD64)**
          ```bash
          tar xzf goplexcli-linux-amd64.tar.gz
          sudo mv goplexcli-linux-amd64 /usr/local/bin/goplexcli
          ```
          
          **Windows**
          Extract the zip file and add the directory to your PATH.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and publish the desktop GUI bundles. These run on native runners
  # (Wails apps can't be cross-compiled) and attach to the same release. They
  # depend on `release` so the release exists first; a failure here never blocks
  # the CLI binaries, which are already published by that job.
  gui-macos:
    name: Build & publish macOS GUI
    needs: release
    runs-on: macos-latest
    env:
      # Set the "Developer ID Application: … (TEAMID)" identity as a repo secret
      # to enable signing + notarization. Left empty, the app is still published
      # but unsigned (Gatekeeper will warn on first open).
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build GUI (universal)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd gui
          wails build -platform darwin/universal -ldflags "-X main.version=${VERSION}"
      - name: Import signing certificate
        if: env.APPLE_SIGN_IDENTITY != ''
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
      - name: Codesign
        if: env.APPLE_SIGN_IDENTITY != ''
        run: |
          codesign --deep --force --timestamp --options runtime \
            --sign "$APPLE_SIGN_IDENTITY" gui/build/bin/goplexcli-gui.app
          codesign --verify --strict --verbose=2 gui/build/bin/goplexcli-gui.app
      - name: Notarize
        if: env.APPLE_SIGN_IDENTITY != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent gui/build/bin/goplexcli-gui.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple gui/build/bin/goplexcli-gui.app
      - name: Package
        run: |
          cd gui/build/bin
          ditto -c -k --keepParent goplexcli-gui.app goplexcli-gui-darwin-universal.zip
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: gui/build/bin/goplexcli-gui-darwin-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gui-windows:
    name: Build & publish Windows GUI
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - name: Build GUI
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd gui
          wails build -platform windows/amd64 -ldflags "-X main.version=${VERSION}"
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path gui/build/bin/goplexcli-gui.exe -DestinationPath gui/build/bin/goplexcli-gui-windows-amd64.zip -Force
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: gui/build/bin/goplexcli-gui-windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
